<head>
    <meta charset="UTF-8" />
    <title>VRRM – Seasonality Heatmap</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f9f9f9;
            color: #333;
        }
        h1 {
            text-align: center;
            margin-bottom: 1rem;
        }
        .top-controls {
            text-align: center;
            margin-bottom: 20px;
        }
        .score {
            text-align: center;
            font-size: 18px;
            margin-bottom: 20px;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            table-layout: fixed;
            margin-bottom: 40px;
        }
        th, td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 10px;
            position: relative;
        }
        th {
            background-color: #444;
            color: white;
        }
        td.highlight {
            outline: 3px solid #2196F3;
            background-color: #e0f7fa;
        }
        .tooltip {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            font-size: 12px;
            position: absolute;
            z-index: 10;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            white-space: pre-line;
            opacity: 0;
            transition: opacity 0.3s;
        }
        td:hover .tooltip {
            visibility: visible;
            opacity: 1;
        }
        .stars {
            font-size: 10px;
            color: gold;
            margin-top: 3px;
            display: block;
        }
        .slot {
            font-size: 18px;
        }
        .heat-up-1 { background-color: #e0f8e0; }
        .heat-up-2 { background-color: #c0f0c0; }
        .heat-up-3 { background-color: #a0e8a0; }
        .heat-up-4 { background-color: #70e070; }
        .heat-up-5 { background-color: #40d040; }
        .heat-down-1 { background-color: #fbe4e4; }
        .heat-down-2 { background-color: #f5c2c2; }
        .heat-down-3 { background-color: #f09f9f; }
        .heat-down-4 { background-color: #ec7c7c; }
        .heat-down-5 { background-color: #e65757; }
        .heat-side-1, .heat-side-2, .heat-side-3, .heat-side-4, .heat-side-5 {
            background-color: #eeeeee;
        }
        select, input[type=text] {
            padding: 6px 10px;
            margin: 0 5px;
            font-size: 14px;
        }
    </style>
</head>

    function renderHeatmap(filter) {
        const container = document.getElementById('heatmap-container');
        container.innerHTML = '';
        let table = '<table><thead><tr><th>Day \\ Hour</th>' + hours.map(h => `<th>${h}h</th>`).join('') + '</tr></thead><tbody>';

        let scoreSum = 0, scoreCount = 0;

        days.forEach(day => {
            table += `<tr><th>${day}</th>`;
            hours.forEach(hour => {
                const slot = slots.find(s => s.Day === day && s.Hour === hour && (filter === 'all' || s.SlotType === filter));

                    scoreCount++;

                    table += '<td></td>';
                }
            });
            table += '</tr>';
        });
        table += '</tbody></table>';
        container.innerHTML = table;
